{% load static %}
<!-- ═══════════════════════ HMS AI CHATBOT WIDGET ═══════════════════════ -->

<!-- Floating bubble button -->
<button id="hms-chat-bubble" onclick="hmsChatToggle()" title="HMS AI Assistant"
    style="position:fixed;bottom:28px;right:28px;z-index:9999;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;cursor:pointer;box-shadow:0 8px 32px rgba(99,102,241,0.5);display:flex;align-items:center;justify-content:center;transition:transform 0.2s,box-shadow 0.2s;">
    <svg id="hms-chat-icon-open" xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="white" viewBox="0 0 24 24">
        <path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.526 3.66 1.438 5.168L2.046 21.953l4.785-1.392A9.953 9.953 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/>
    </svg>
    <svg id="hms-chat-icon-close" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 24 24" style="display:none;">
        <path d="M18 6L6 18M6 6l12 12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <!-- Pulse ring -->
    <span id="hms-chat-pulse" style="position:absolute;width:100%;height:100%;border-radius:50%;background:rgba(99,102,241,0.35);animation:hmsPulse 2s infinite;pointer-events:none;"></span>
</button>

<!-- Chat panel -->
<div id="hms-chat-panel" style="
    position:fixed;bottom:100px;right:28px;z-index:9998;
    width:370px;max-width:calc(100vw - 32px);
    background:linear-gradient(160deg,#0f172a 0%,#1e1b4b 100%);
    border:1px solid rgba(99,102,241,0.3);
    border-radius:20px;
    box-shadow:0 24px 64px rgba(0,0,0,0.5);
    display:none;flex-direction:column;overflow:hidden;
    animation:hmsPanelIn 0.25s ease;
    font-family:'Inter',system-ui,sans-serif;
">
    <!-- Header -->
    <div style="background:linear-gradient(135deg,#6366f1,#8b5cf6);padding:16px 20px;display:flex;align-items:center;gap:12px;">
        <div style="width:40px;height:40px;background:rgba(255,255,255,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 24 24">
                <path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm0 18a8 8 0 110-16 8 8 0 010 16zm-1-11h2v2h-2zm0 4h2v4h-2z"/>
            </svg>
        </div>
        <div style="flex:1;">
            <p style="color:white;font-weight:700;font-size:15px;margin:0;line-height:1.2;">HMS Assistant</p>
            <p style="color:rgba(255,255,255,0.7);font-size:12px;margin:0;">Powered by Groq AI · Always here to help</p>
        </div>
        <div style="width:8px;height:8px;background:#4ade80;border-radius:50%;box-shadow:0 0 8px #4ade80;flex-shrink:0;"></div>
    </div>

    <!-- Messages -->
    <div id="hms-chat-messages" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;min-height:280px;max-height:360px;scrollbar-width:thin;scrollbar-color:rgba(99,102,241,0.4) transparent;">
        <!-- Welcome message -->
        <div class="hms-msg-bot" style="display:flex;align-items:flex-start;gap:8px;">
            <div style="width:28px;height:28px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="white" viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2z"/></svg>
            </div>
            <div style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:4px 14px 14px 14px;padding:10px 14px;color:#e2e8f0;font-size:13.5px;line-height:1.5;max-width:85%;">
                👋 Hi! I'm your <strong style="color:#a5b4fc;">HMS AI Assistant</strong>. I can help you with fees, complaints, room details, and general hostel info. What can I help you with?
            </div>
        </div>
    </div>

    <!-- Typing indicator (hidden by default) -->
    <div id="hms-typing" style="display:none;padding:0 16px 8px;display:none;align-items:center;gap:8px;">
        <div style="width:28px;height:28px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="white" viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2z"/></svg>
        </div>
        <div style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:4px 14px 14px 14px;padding:10px 14px;">
            <span style="display:inline-flex;gap:4px;align-items:center;">
                <span style="width:6px;height:6px;background:#a5b4fc;border-radius:50%;animation:hmsDot 1.2s infinite 0s;display:inline-block;"></span>
                <span style="width:6px;height:6px;background:#a5b4fc;border-radius:50%;animation:hmsDot 1.2s infinite 0.2s;display:inline-block;"></span>
                <span style="width:6px;height:6px;background:#a5b4fc;border-radius:50%;animation:hmsDot 1.2s infinite 0.4s;display:inline-block;"></span>
            </span>
        </div>
    </div>

    <!-- Input area -->
    <div style="padding:12px 14px;border-top:1px solid rgba(255,255,255,0.08);background:rgba(0,0,0,0.2);display:flex;gap:8px;align-items:flex-end;">
        <textarea id="hms-chat-input" rows="1" placeholder="Ask me anything about HMS..."
            onkeydown="hmsChatKeydown(event)"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,96)+'px';"
            style="flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:10px 14px;color:#e2e8f0;font-size:13.5px;resize:none;outline:none;line-height:1.4;font-family:inherit;transition:border-color 0.2s;"
            onfocus="this.style.borderColor='rgba(99,102,241,0.6)'"
            onblur="this.style.borderColor='rgba(255,255,255,0.12)'"
        ></textarea>
        <button onclick="hmsChatSend()" id="hms-send-btn"
            style="width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.15s,opacity 0.15s;"
            onmouseenter="this.style.transform='scale(1.1)'" onmouseleave="this.style.transform='scale(1)'">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" viewBox="0 0 24 24">
                <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
            </svg>
        </button>
    </div>
    <div style="text-align:center;padding:6px 0 10px;color:rgba(255,255,255,0.25);font-size:10.5px;">HMS AI · Llama 3.3 70B via Groq</div>
</div>

<style>
@keyframes hmsPulse { 0%,100%{transform:scale(1);opacity:0.6} 50%{transform:scale(1.5);opacity:0} }
@keyframes hmsPanelIn { from{opacity:0;transform:translateY(16px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }
@keyframes hmsDot { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }
#hms-chat-messages::-webkit-scrollbar { width: 4px; }
#hms-chat-messages::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.4); border-radius: 4px; }
</style>

<script>
(function() {
    var hmsHistory = [];
    var hmsPanelOpen = false;

    window.hmsChatToggle = function() {
        hmsPanelOpen = !hmsPanelOpen;
        var panel = document.getElementById('hms-chat-panel');
        var iconOpen = document.getElementById('hms-chat-icon-open');
        var iconClose = document.getElementById('hms-chat-icon-close');
        var pulse = document.getElementById('hms-chat-pulse');
        
        if (hmsPanelOpen) {
            panel.style.display = 'flex';
            panel.style.flexDirection = 'column';
            iconOpen.style.display = 'none';
            iconClose.style.display = 'block';
            pulse.style.animation = 'none';
            document.getElementById('hms-chat-input').focus();
        } else {
            panel.style.display = 'none';
            iconOpen.style.display = 'block';
            iconClose.style.display = 'none';
            pulse.style.animation = 'hmsPulse 2s infinite';
        }
    };

    window.hmsChatKeydown = function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            hmsChatSend();
        }
    };

    window.hmsChatSend = function() {
        var input = document.getElementById('hms-chat-input');
        var msg = input.value.trim();
        if (!msg) return;
        input.value = '';
        input.style.height = 'auto';

        hmsAppendMessage('user', msg);
        hmsHistory.push({ role: 'user', content: msg });

        // Show typing
        var typing = document.getElementById('hms-typing');
        typing.style.display = 'flex';
        var btn = document.getElementById('hms-send-btn');
        btn.disabled = true;
        btn.style.opacity = '0.5';

        fetch('/chatbot/ask/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg, history: hmsHistory.slice(-10) })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            typing.style.display = 'none';
            btn.disabled = false;
            btn.style.opacity = '1';
            var reply = data.reply || data.error || 'Sorry, something went wrong.';
            hmsAppendMessage('bot', reply);
            hmsHistory.push({ role: 'assistant', content: reply });
        })
        .catch(function() {
            typing.style.display = 'none';
            btn.disabled = false;
            btn.style.opacity = '1';
            hmsAppendMessage('bot', '⚠️ Could not reach the AI assistant. Please try again.');
        });
    };

    function hmsAppendMessage(role, text) {
        var container = document.getElementById('hms-chat-messages');
        var wrapper = document.createElement('div');
        wrapper.style.cssText = 'display:flex;align-items:flex-start;gap:8px;' + (role === 'user' ? 'flex-direction:row-reverse;' : '');

        var avatar = document.createElement('div');
        if (role === 'user') {
            avatar.style.cssText = 'width:28px;height:28px;background:linear-gradient(135deg,#0ea5e9,#6366f1);border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;';
            avatar.textContent = 'You';
        } else {
            avatar.style.cssText = 'width:28px;height:28px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;';
            avatar.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="white" viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2z"/></svg>';
        }

        var bubble = document.createElement('div');
        var userBubbleStyle = 'background:linear-gradient(135deg,rgba(99,102,241,0.35),rgba(139,92,246,0.25));border:1px solid rgba(99,102,241,0.4);border-radius:14px 4px 14px 14px;';
        var botBubbleStyle = 'background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:4px 14px 14px 14px;';
        bubble.style.cssText = (role === 'user' ? userBubbleStyle : botBubbleStyle) + 'padding:10px 14px;color:#e2e8f0;font-size:13.5px;line-height:1.5;max-width:85%;white-space:pre-wrap;word-break:break-word;';
        bubble.textContent = text;

        wrapper.appendChild(avatar);
        wrapper.appendChild(bubble);
        container.appendChild(wrapper);
        container.scrollTop = container.scrollHeight;
    }
})();
</script>
<!-- ══════════════════════════════════════════════════════════════════════ -->
